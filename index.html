<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>job tracker</title>

    <!-- tailwindcss  -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css  -->
    <link rel="stylesheet" href="./style.css">


    <!-- daisy UI    -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <!-- Card -->
    <div class="bg-white w-[520px] p-10 rounded-xl shadow-md">

        <!-- logo -->
        <div class="text-center mb-6">


            <img class="w-20 mx-auto mb-4" src="./assets/github-logo.png" alt="github">
            <h2 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h2>
            <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
        </div>

        <!-- from -->
        <div class="space-y-4">


            <div>
                <label class="text-sm font-medium">Username</label>
                <input type="text" placeholder="Enter Username" class="input input-bordered w-full mt-1">
                <p class="text-blue-500 text-xs mt-1">Default: admin</p>



            </div>

            <div>
                <label class="text-sm font-medium">Password</label>

                <input type="password" placeholder="Enter Password" class="input input-bordered w-full mt-1">
                <p class="text-blue-500 text-xs mt-1">Default: admin123</p>
            </div>

            <!-- button -->

            <button class="w-full py-3 rounded-lg text-white font-semibold bg-indigo-600">
                Sign In
            </button>

            <!-- or section -->


            <div class="flex items-center gap-3 my-4">
                <div class="flex-1 h-px bg-gray-300"></div>

                <span class="text-gray-400 text-sm">OR</span>

                <div class="flex-1 h-px bg-gray-300"></div>
            </div>

            <!-- demo -->
            <div class="bg-gray-100 p-4 rounded-lg text-center text-sm">
                <p class="text-gray-500 mb-2">Demo Credentials:</p>

                <p><strong>Username:</strong> admin</p>

                <p><strong>Password:</strong> admin123</p>
            </div>

        </div>

    </div>

</body>

</html>
